<script>

const grid = document.getElementById("grid");

grid.innerHTML="";

let numerosReservados =
JSON.parse(
localStorage.getItem(
"rifa_fabio"
)
) || [];

for(let i=1;i<=100;i++){

const numero =
document.createElement("div");

numero.className="numero";

const codigo =
String(i)
.padStart(2,"0");

numero.textContent =
codigo;

function pintar(){

if(
numerosReservados.includes(codigo)
){

numero.style.background=
"#e53935";

numero.style.color=
"#fff";

numero.style.cursor=
"not-allowed";

}else{

numero.style.background=
"";

numero.style.color=
"";

}

}

pintar();

numero.addEventListener(
"click",
()=>{

if(
numerosReservados.includes(
codigo
)
){

alert(
"Este número já foi escolhido."
);

return;

}

const nome =
prompt(
"Digite seu nome:"
);

if(!nome) return;

const celular =
prompt(
"Digite seu WhatsApp:"
);

if(!celular) return;

numerosReservados.push(
codigo
);

localStorage.setItem(
"rifa_fabio",
JSON.stringify(
numerosReservados
)
);

pintar();

const texto =
encodeURIComponent(
`Olá! Quero reservar o número ${codigo} da rifa beneficente.

Nome: ${nome}

WhatsApp: ${celular}`
);

window.open(
`https://wa.me/559981771386?text=${texto}`,
"_blank"
);

}
);

grid.appendChild(
numero
);

}

</script>
